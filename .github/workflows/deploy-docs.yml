name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ./docs-site

      - name: Build
        run: pnpm run build
        working-directory: ./docs-site
        env:
          NEXT_PUBLIC_SITE_URL: https://snpm.io
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify Pages artifact
        run: |
          test -f out/.nojekyll
          grep -Fxq "snpm.io" out/CNAME
          ! grep -R -I --fixed-strings --line-number 'src="/snpm/' out
          ! grep -R -I --fixed-strings --line-number 'href="/snpm' out
          ! grep -R -I --fixed-strings --line-number '"/snpm/_next' out
        working-directory: ./docs-site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-site/out

  deploy:
    environment:
      name: github-pages
      url: https://snpm.io
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
